name: Code Health Report

on:
  workflow_call:
    inputs:
      frontend_dir:
        description: "Frontend directory"
        type: string
        default: "client"
      backend_dir:
        description: "Backend directory"
        type: string
        default: "server"
      extensions:
        description: "File extensions to scan (comma-separated)"
        type: string
        default: "js,jsx,ts,tsx"

jobs:
  report:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate code health report
        id: health
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const extensions = '${{ inputs.extensions }}'.split(',').map(e => '.' + e.trim());
            const ignoreDirs = ['node_modules', 'dist', 'build', '.next', 'coverage', '.git', 'vendor'];

            function walkDir(dir) {
              const files = [];
              if (!fs.existsSync(dir)) return files;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  if (!ignoreDirs.includes(entry.name)) {
                    files.push(...walkDir(fullPath));
                  }
                } else if (extensions.includes(path.extname(entry.name))) {
                  files.push(fullPath);
                }
              }
              return files;
            }

            const allFiles = walkDir('.');
            const good = [];    // under 500
            const warning = [];  // 500-700
            const hot = [];      // over 700

            for (const file of allFiles) {
              const lines = fs.readFileSync(file, 'utf8').split('\n').length;
              const entry = { file, lines };
              if (lines < 500) good.push(entry);
              else if (lines <= 700) warning.push(entry);
              else hot.push(entry);
            }

            const total = allFiles.length;
            const pct = total > 0 ? Math.round((good.length / total) * 100) : 100;

            // Build the comment
            const lines = [
              `## 📊 Code Health Report`,
              '',
              `| Status | Count | |`,
              `|---|---|---|`,
              `| 🟢 Under 500 lines | **${good.length}** / ${total} files | ${pct}% healthy |`,
              `| 🟡 500–700 lines | **${warning.length}** | |`,
              `| 🔴 Over 700 lines | **${hot.length}** | |`,
            ];

            if (warning.length > 0) {
              lines.push('', '<details><summary>🟡 Warning zone (500–700 lines)</summary>', '');
              warning.sort((a, b) => b.lines - a.lines);
              for (const f of warning) {
                lines.push(`- \`${f.file}\` — ${f.lines} lines`);
              }
              lines.push('', '</details>');
            }

            if (hot.length > 0) {
              lines.push('', '<details><summary>🔴 Needs attention (700+ lines)</summary>', '');
              hot.sort((a, b) => b.lines - a.lines);
              for (const f of hot) {
                lines.push(`- \`${f.file}\` — ${f.lines} lines`);
              }
              lines.push('', '</details>');
            }

            // Find and update existing comment, or create new
            const marker = '<!-- code-health-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n${lines.join('\n')}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            core.info(`Health: ${good.length}/${total} files under 500 lines (${pct}%)`);
